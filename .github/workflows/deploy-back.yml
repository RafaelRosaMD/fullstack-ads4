name: Deploy backend na VPS

on:
  push:
    branches: [ "main" ]
    paths:
      - "back/**"
      - ".github/workflows/deploy-back.yml"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: back

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Gerar o jar
        run: mvn clean package -DskipTests

      - name: Preparar SSH
        working-directory: .
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 22 -H 178.104.64.56 >> ~/.ssh/known_hosts

      - name: Enviar jar para o servidor
        working-directory: .
        run: |
          JAR_FILE=$(find back/target -maxdepth 1 -name "*.jar" ! -name "*.jar.original" | head -n 1)
          echo "Enviando: $JAR_FILE"
          scp -P 22 "$JAR_FILE" ${{ secrets.SERVER_USER }}@178.104.64.56:/opt/app-teste.jar

      - name: Subir aplicação no servidor
        working-directory: .
        run: |
          ssh -p 22 ${{ secrets.SERVER_USER }}@178.104.64.56 "
            pkill -f '/opt/app-teste.jar' || true
            nohup java -jar /opt/app-teste.jar > /opt/app-teste.log 2>&1 &
          "
